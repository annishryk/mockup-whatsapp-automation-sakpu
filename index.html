<html lang="id">
<head>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .controls h3 {
            color: #075E54;
            margin-bottom: 15px;
        }

        .step-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .step-btn {
            padding: 12px 15px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .step-btn:hover:not(:disabled) {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .step-btn.active {
            background: #075E54;
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.3);
        }

        .step-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .phone-mockup {
            background: white;
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            margin: 0 auto;
        }

        .phone-header {
            background: #075E54;
            color: white;
            padding: 15px;
            border-radius: 15px 15px 0 0;

            align-items: center;
            gap: 10px;
        }

            height: 40px;

            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #075E54;
            font-size: 1.2rem;
        }

        .phone-header .title {
            flex: 1;
        }

        .phone-header .title h3 {
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .phone-header .title p {
            font-size: 0.85rem;
            opacity: 0.8;
        }

            background: #E5DDD5;
            min-height: 500px;
            max-height: 600px;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .message {
            margin-bottom: 15px;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            display: flex;
            justify-content: flex-start;
        }

        .message.user {
            display: flex;
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 10px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.bot .message-bubble {
            background: white;
            border-radius: 0 10px 10px 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message.user .message-bubble {
            background: #DCF8C6;
            border-radius: 10px 0 10px 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-time {
            font-size: 0.7rem;
            color: #666;
            margin-top: 5px;
            text-align: right;
        }

        .input-area {

            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .input-area button:hover {
            background: #128C7E;
        }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 0 0 15px 15px;
        }

        .quick-btn {
            padding: 10px 15px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            flex: 1;
            min-width: 100px;
            font-weight: 600;
        }

        .quick-btn:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);

            background: rgba(7, 94, 84, 0.05);

        .status-badge {

            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;

            background: #25D366;
            color: white;
        }

            background: #FFA500;
            color: white;
        }

        .status-badge.info {
            background: #2196F3;
            color: white;
        }

            display: inline-block;

            height: 8px;
            border-radius: 50%;

            animation: loading 1.4s infinite ease-in-out both;

        }

        .loading:nth-child(1) { animation-delay: -0.32s; }

        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
            margin: 10px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #25D366, #128C7E);
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
        }

        pre {
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            overflow-x: auto;

            justify-content: center;

                messages: [
                    { type: 'user', text: 'SETUJU', time: '10:19' },
                    { type: 'bot', text: '⏳ Memproses analisis...', time: '10:19' },
                    { type: 'bot', text: '🎉 <strong>SELESAI!</strong><br><br>━━━━━━━━━━━━━━━<br>📊 <strong>HASIL ANALISIS</strong><br>━━━━━━━━━━━━━━━<br><br><div class="success-box"><strong>Nomor:</strong> SIM-2025-001<br><strong>Tanggal:</strong> ' + new Date().toLocaleDateString('id-ID') + '<br><strong>User:</strong> Annisa Haryoko</div><br><strong>🎯 KEBIJAKAN:</strong><br>Peraturan Tarif Gas Industri 2025<br><br><strong> ANALISIS:</strong><br><br><div class="success-box"><span class="status-badge success">RISIKO: RENDAH</span><br><br><strong>Temuan:</strong><br>1. Tidak ada hambatan masuk<br>2. Tidak diskriminatif<br>3. Perlu kajian konsentrasi<br>4. Tidak membatasi persaingan<br>5. Perlu pemantauan dominasi<br><br><strong>Rekomendasi:</strong><br>✅ Evaluasi 6 bulan<br>✅ Kajian konsentrasi pasar<br>✅ Saluran pengaduan<br>✅ Transparansi data<br>✅ Koordinasi KPPU</div><br><strong>📄 Dokumen:</strong><br>• Laporan lengkap (PDF)<br>• Ringkasan eksekutif<br>• Data jawaban (Excel)<br>• Sertifikat simulasi<br><br>🌐 Download: sakpu.kppu.go.id/simulasi/SIM-2025-001<br><br>Ketik MENU untuk kembali', time: '10:20' }

        };

        function goToStep(stepNumber) {
            if (stepNumber < 1 || stepNumber > 9) return;
            
            console.log('Going to step:', stepNumber);
            currentStep = stepNumber;
            updateStepButtons();
            renderStep(stepNumber);
        }

        function updateStepButtons() {
            const buttons = document.querySelectorAll('.step-btn');
            buttons.forEach((btn, index) => {
                const stepNum = index + 1;
                btn.classList.remove('active');
                
                if (stepNum === currentStep) {
                    btn.classList.add('active');
                }
                
                btn.disabled = false;
            });
        }

        function renderStep(stepNumber) {
            const step = steps[stepNumber];
            if (!step) {
                console.error('Step not found:', stepNumber);
                return;
            }
            
            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML = '';
            
            const statusText = document.getElementById('status-text');
            if (stepNumber >= 4 && stepNumber <= 8) {
                statusText.textContent = 'Simulasi Aktif';
            } else {
                statusText.textContent = 'online';
            }
            
            let delay = 0;
            step.messages.forEach((msg) => {
                setTimeout(() => {
                    addMessage(msg.type, msg.text, msg.time);
                }, delay);
                delay += 300;
            });
            
            setTimeout(() => {
                updateQuickButtons(step.buttons);
            }, delay + 100);
        }

        function addMessage(type, text, time) {
            const chatArea = document.getElementById('chat-area');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${text}
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function updateQuickButtons(buttons) {
            const quickButtonsDiv = document.getElementById('quick-buttons');
            quickButtonsDiv.innerHTML = '';
            
            if (!buttons || buttons.length === 0) return;
            
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.className = 'quick-btn';
                button.textContent = btn.text;
                button.onclick = () => handleQuickButton(btn.value, btn.nextStep);
                quickButtonsDiv.appendChild(button);
            });
        }

        function handleQuickButton(value, nextStep) {
            console.log('Button clicked:', value, 'Next step:', nextStep);
            
            const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            addMessage('user', value, time);
            
            if (nextStep) {
                setTimeout(() => {
                    goToStep(nextStep);
                }, 1000);
            }
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            addMessage('user', message, time);
            
            input.value = '';
            
            const upperMessage = message.toUpperCase();
            if (upperMessage === 'MENU') {
                setTimeout(() => goToStep(2), 500);
            } else if (upperMessage === 'MULAI') {
                setTimeout(() => goToStep(4), 500);
            } else if (upperMessage === 'YA' || upperMessage === 'LANJUT') {
                setTimeout(() => goToStep(currentStep + 1), 500);
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function resetJourney() {
            if (confirm('Reset journey dari awal?')) {
                goToStep(1);
            }
        }

        window.onload = function() {
            console.log('Page loaded, initializing...');
            updateStepButtons();
            renderStep(1);
        };
    </script>
</body>
